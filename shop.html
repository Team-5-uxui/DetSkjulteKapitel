    <main>
      <h1>Produkter</h1>

      <div class="filter-wrapper">
        <button class="filter-btn" id="filterToggle">⇌ Filtrer</button>

        <div class="filter-panel" id="filterPanel">
          <div class="filter-header">
            <p>Filtrer</p>
            <button id="filterLuk">✕</button>
          </div>
          <hr />
          <p class="filter-alle" data-type="alle" data-filter="alle">Alle</p>
          <hr />

          <div class="filter-gruppe">
            <p class="filter-titel" data-target="kategoriValg">Kategori</p>
            <hr />
            <div class="filter-valg" id="kategoriValg">
              <p data-type="kategori" data-filter="Tøj">Tøj</p>
              <p data-type="kategori" data-filter="Accessories">Accessories</p>
              <p data-type="kategori" data-filter="Til bøger">Til bøger</p>
              <hr />
            </div>
          </div>

          <div class="filter-gruppe">
            <p class="filter-titel" data-target="storrelseValg">Størrelse</p>
            <hr />
            <div class="filter-valg" id="storrelseValg">
              <p data-type="storrelse" data-filter="S">Small</p>
              <p data-type="storrelse" data-filter="M">Medium</p>
              <p data-type="storrelse" data-filter="L">Large</p>
              <p data-type="storrelse" data-filter="One size">One size</p>
              <hr />
            </div>
          </div>

          <div class="filter-gruppe">
            <p class="filter-titel" data-target="farveValg">Farve</p>
            <hr />
            <div class="filter-valg" id="farveValg">
              <p data-type="farve" data-filter="Sort">Sort</p>
              <p data-type="farve" data-filter="Hvid">Hvid</p>
              <p data-type="farve" data-filter="Lilla">Lilla</p>
              <hr />
            </div>
          </div>
        </div>
      </div>
      <div id="products"></div>
    </main>
    <footer>
      <div class="footer-inner">
        <a href="index.html" class="footer-logo">
          <img src="img/Logo.svg" alt="Det Skjulte Kapitel" class="logo-img-footer" />
        </a>

        <div class="footer-bottom-row">

          </div>

            <div class="social-icons">
              <a href="https://open.spotify.com/show/3m8Jab1IPtWVq0r0YH2QnV"><img src="img/Spotify.svg" alt="Spotify" /></a>
              <a href="https://open.podimo.com/podcast/a7241b3f-1531-4056-aa6a-d502dbbe5295"><img src="img/Podimo.svg" alt="Podimo" /></a>
              <a href="https://podcasts.apple.com/dk/podcast/det-skjulte-kapitel/id1886661915"><img class="apple" src="img/applepodcast.svg" alt="Apple Podcast" /></a>
            </div>
          </div>
        </div>
      </div>
    </footer>
